on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run ESLint
        id: eslint
        run: npm run lint || echo "eslint_failed=true" >> $GITHUB_OUTPUT
      - name: Run Prettier
        id: prettier
        run: npx prettier --check . || echo "prettier_failed=true" >> $GITHUB_OUTPUT
      - name: Post Code Quality Report
        uses: actions/github-script@v7
        with:
          script: |
            const { eslint_failed, prettier_failed } = context.steps;
            let body = "## Code Quality Report\n\n";
            body += "### ESLint Checks: " + (eslint_failed ? "❌ Failed" : "✅ Passed") + "\n";
            body += "### Prettier Checks: " + (prettier_failed ? "❌ Failed" : "✅ Passed") + "\n";
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  testing-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run Tests with Coverage
        id: test
        run: npm test -- --coverage || echo "test_failed=true" >> $GITHUB_OUTPUT
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        with:
          script: |
            const { test_failed } = context.steps;
            let body = "## Test Coverage Report\n\n";
            body += "### Test Suite: " + (test_failed ? "❌ Failed" : "✅ Passed") + "\n";
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run Dependency Vulnerability Check
        id: npm-audit
        run: npm audit || echo "vulnerabilities_found=true" >> $GITHUB_OUTPUT
      - name: Scan for Secrets
        id: secret-scan
        uses: trufflesecurity/trufflehog@v3.65.0
        with:
          path: .
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
      - name: Post Security Scan Report
        uses: actions/github-script@v7
        with:
          script: |
            const { vulnerabilities_found } = context.steps;
            const secretScanOutput = context.steps['secret-scan'].outputs;
            let body = "## Security Scan Report\n\n";
            body += "### Dependencies: " + (vulnerabilities_found ? "❌ Vulnerabilities Found" : "✅ No Vulnerabilities") + "\n";
            body += "### Secrets Scan: " + (secretScanOutput.secrets_found ? "❌ Secrets Found" : "✅ No Secrets") + "\n";
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  build-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build Application
        id: build
        run: npm run build || echo "build_failed=true" >> $GITHUB_OUTPUT
      - name: Validate Endpoints
        id: endpoints
        run: |
          # Start application in background
          npm start &
          # Wait for app to initialize
          sleep 10
          # Check if main endpoint is accessible
          curl -f http://localhost:3000 || echo "endpoints_failed=true" >> $GITHUB_OUTPUT
          # Stop application
          pkill -f "npm start"
      - name: Upload Deployment Preview Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-preview
          path: dist/
      - name: Post Build Validation
        uses: actions/github-script@v7
        with:
          script: |
            const { build_failed, endpoints_failed } = context.steps;
            let body = "## Build Validation\n\n";
            body += "### Build: " + (build_failed ? "❌ Failed" : "✅ Passed") + "\n";
            body += "### Endpoints: " + (endpoints_failed ? "❌ Failed" : "✅ Passed") + "\n";
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });